<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <title>CasaFlow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="icon" href="img/favicon.ico">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <header class="app-header">
        <div class="brand">
            <img src="img/logo.png" class="logo" alt="CasaFlow">
            <div>
                <strong>CasaFlow</strong>
                <span>Inventário e compras</span>
            </div>
        </div>
    </header>

    <main class="container" id="app"></main>
    <div id="modalRoot"></div>
    <div id="toastRoot"></div>

    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js" defer></script>
    <script src="firebase-config.js" defer></script>
    <script src="app.js" defer></script>
    <button id="btnTop" onclick="voltarTopo()">↑</button>
</body>

</html>
